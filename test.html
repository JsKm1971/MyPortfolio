<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Layout</title>
    <style>
        /* Reset */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body */

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #ffffff;
            color: #000000;
            line-height: 1.6;
        }

        /* Navigation */

        header {
            border-bottom: 1px solid #dddddd;
        }

        nav {
            max-width: 1100px;
            margin: auto;
            padding: 20px;

            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: #000;
            font-weight: bold;
            transition: .3s;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        /* Hero */

        .hero {
            max-width: 900px;
            margin: 120px auto;
            text-align: center;
            padding: 20px;
        }

        .hero h1 {
            font-size: 52px;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 20px;
            margin-bottom: 40px;
        }

        .hero button {
            padding: 14px 28px;
            font-size: 18px;
            cursor: pointer;

            background: #000;
            color: #fff;

            border: none;
            transition: .3s;
        }

        .hero button:hover {
            background: #444;
        }

        /* Footer */

        footer {
            text-align: center;
            padding: 30px;
            border-top: 1px solid #ddd;
            margin-top: 80px;
        }

        /* Mobile */

        @media(max-width:768px) {

            nav {
                flex-direction: column;
                gap: 20px;
            }

            .nav-links {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }

            .hero h1 {
                font-size: 40px;
            }

            .hero p {
                font-size: 18px;
            }

        }
    </style>
</head>

<body>
    <header>
        <nav>
            <div class="logo">
                My Website
            </div>

            <ul class="nav-links">
                <li><a href="#" onclick="showMessage('Home')">Home</a></li>
                <li><a href="#" onclick="showMessage('About')">About</a></li>
                <li><a href="#" onclick="showMessage('Contact')">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <section class="hero">
            <h1>Welcome</h1>

            <p>
                This is a simple homepage built with HTML, CSS, and JavaScript.
                It provides a clean foundation that you can expand into a complete website.
            </p>

            <button onclick="learnMore()">
                Learn More
            </button>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 My Website. All Rights Reserved.</p>
    </footer>

    <script src="script.js">

        function showMessage(page) {

            alert("You clicked the " + page + " page.");

        }

        function learnMore() {

            alert("Thanks for visiting! Expand this page with your own content.");

        }




    </script>

</body>

</html>
